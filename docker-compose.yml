services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
    # Not exposed to host — only the app container needs it
    expose:
      - "5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET:           ${JWT_SECRET}
      JWT_EXPIRES_IN:       ${JWT_EXPIRES_IN:-7d}
      NEXT_PUBLIC_APP_URL:  ${NEXT_PUBLIC_APP_URL}
      SMTP_HOST:            ${SMTP_HOST:-}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
      SMTP_FROM:            ${SMTP_FROM:-}
      IMAP_HOST:            ${IMAP_HOST:-}
      IMAP_PORT:            ${IMAP_PORT:-993}
      IMAP_USER:            ${IMAP_USER:-}
      IMAP_PASS:            ${IMAP_PASS:-}
      IMAP_MAILBOX:         ${IMAP_MAILBOX:-INBOX}
      AUTOMATION_PROCESS_SECRET: ${AUTOMATION_PROCESS_SECRET:-}
      ENABLE_AUTOMATION_RUNNER: "true"
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
      RESO_SYNC_SECRET:     ${RESO_SYNC_SECRET:-}
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
      AMPRE_IDX_TOKEN:        ${AMPRE_IDX_TOKEN:-}
      AMPRE_DLA_TOKEN:        ${AMPRE_DLA_TOKEN:-}
      AMPRE_VOX_TOKEN:        ${AMPRE_VOX_TOKEN:-}
      AMPRE_BROKERAGE_NAME:   ${AMPRE_BROKERAGE_NAME:-}


volumes:
  pgdata:
