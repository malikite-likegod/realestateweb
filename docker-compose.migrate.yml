# Run once to migrate + seed: docker compose -f docker-compose.yml -f docker-compose.migrate.yml run --rm migrate
services:
  migrate:
    build:
      context: .
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    entrypoint: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node node_modules/prisma/build/index.js db seed"]
